spring:
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/fearless_tasting_spring?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&useUnicode=true}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.fearlesstasting: DEBUG
