name: fearless-tasting

services:
  mysql-writer:
    image: mysql:8.0
    container_name: fearless-tasting-mysql-writer
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fearless_tasting}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app1234}
    volumes:
      - mysql-writer-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --server-id=1 --log-bin=mysql-bin --binlog-format=ROW
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-reader:
    image: mysql:8.0
    container_name: fearless-tasting-mysql-reader
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fearless_tasting}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app1234}
    volumes:
      - mysql-reader-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --server-id=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: sh -c "pnpm --filter @repo/api exec prisma migrate deploy && pnpm --filter @repo/api dev"
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/types/src:/app/packages/types/src
      - ./packages/utils/src:/app/packages/utils/src
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-app1234}@mysql-writer:3306/${MYSQL_DATABASE:-fearless_tasting}
      # 로컬 개발: 복제 미설정이므로 Reader도 Writer를 가리킴
      DATABASE_READER_URL: mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-app1234}@mysql-writer:3306/${MYSQL_DATABASE:-fearless_tasting}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-your_kakao_client_id}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-your_kakao_client_secret}
      KAKAO_CALLBACK_URL: http://localhost:4000/auth/kakao/callback
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-in-prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-prod}
      FRONTEND_URL: http://localhost:4321
      # SMTP (문의 알림용, 미설정 시 이메일 발송 스킵)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
    depends_on:
      mysql-writer:
        condition: service_healthy
      mysql-reader:
        condition: service_healthy

  web:
    build: .
    command: pnpm --filter @repo/web dev --host 0.0.0.0
    ports:
      - "4321:4321"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages/types/src:/app/packages/types/src
      - ./packages/utils/src:/app/packages/utils/src
    environment:
      PUBLIC_API_URL: http://localhost:4000

volumes:
  mysql-writer-data:
  mysql-reader-data:
