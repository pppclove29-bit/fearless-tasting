name: Claude Code - Feature Request

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude-code:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'feature-request')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ github.event.issue.number }}
          auto_create_pr: true
          pr_labels: "auto-merge"
          prompt: |
            이 GitHub Issue의 요구사항을 구현해주세요.

            프로젝트 규칙:
            - CLAUDE.md 파일을 먼저 읽고 규칙을 따라주세요
            - any/unknown 타입 금지
            - Controller는 요청/응답만, 비즈니스 로직은 Service
            - DB read: this.prisma.read, write: this.prisma.write
            - DTO 프로퍼티는 ! 사용
            - 프론트: astro:page-load 패턴 (직접 init 호출 금지)
            - API 응답 구조를 백엔드/프론트 일치시킬 것

            구현 후 반드시:
            1. pnpm --filter @repo/api build 통과 확인
            2. pnpm --filter @repo/web build 통과 확인
